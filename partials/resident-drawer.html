<section id="resident-drawer" class="panel floating-drawer drawer-secondary hidden">
  <div class="panel-head">
    <h2>Resident Grid</h2>
    <span class="badge">6 experts</span>
  </div>
  <div class="resident-tools">
    <input
      id="resident-search"
      class="resident-search"
      type="text"
      placeholder="Search residents, domains, or roles..."
      autocomplete="off"
    />
    <div id="resident-filter-chips" class="resident-filter-chips"></div>
  </div>
  <p id="resident-empty" class="helper-copy resident-empty hidden">
    No residents match the current search.
  </p>
  <div id="expert-list" class="expert-list"></div>
</section>
